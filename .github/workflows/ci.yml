name: CI — Integración Continua

# Pipeline de integración continua: compila, verifica formato/lint y ejecuta las pruebas
# en cada push y pull request. Es la primera línea de defensa de DevOps.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    name: Compilar, lintar y probar
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      - name: Lint de Solidity (Solhint)
        run: npm run lint:sol

      - name: Compilar el contrato
        run: npm run compile

      - name: Ejecutar las pruebas
        run: npm test

      - name: Reporte de cobertura
        run: npm run coverage
        continue-on-error: true

      - name: Publicar cobertura como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
        if: always()
